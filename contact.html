<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Local Pet Adoption Service</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Site navigation links -->
    <nav>
      <a href="index.html">Home</a> |
      <a href="contact.html">Contact</a> |
      <a href="about.html">About</a>
    </nav>

    <!-- Contact information section -->
    <h1>Contact Us</h1>
    <p>Reach out to us to schedule a visit or ask about available pets.</p>
    <p>Email: adopt@localpets.org</p>
    <p>Phone: (555) 123-4567</p>

    <!-- Visitor inquiry form -->
    <h2>Contact Form</h2>
    <form>
      <label for="name">Name:</label><br />
      <input type="text" id="name" name="name" /><br /><br />

      <label for="email">Email:</label><br />
      <input type="email" id="email" name="email" /><br /><br />

      <label for="message">Message:</label><br />
      <textarea id="message" name="message" rows="4" cols="40"></textarea><br /><br />

      <button type="submit">Send</button>
    </form>

    <!-- Short documentation note for this page -->
    <p>This page allows visitors to send questions or requests about adoption opportunities.</p>
    <p><a href="index.html">Back to Home</a></p>
  </body>
</html>
